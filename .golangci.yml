# golangci-lint configuration for GLX project
# See https://golangci-lint.run/usage/configuration/ for all options

version: 2

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports

linters:
  enable:
    # Code quality (enabled by default, but listed for clarity)
    - errcheck        # Check for unchecked errors
    - govet           # Standard Go tool
    - ineffassign     # Detect ineffectual assignments
    - staticcheck     # Advanced static analysis (includes gosimple, stylecheck)
    - unused          # Check for unused code

    # Style
    - revive          # Replacement for golint

    # Bugs
    - bodyclose       # Check HTTP response body is closed
    - errname         # Check error naming conventions
    - errorlint       # Find code that will cause problems with Go 1.13+ error wrapping
    - nilerr          # Check for returning nil error

    # Complexity
    - gocyclo         # Cyclomatic complexity
    - gocognit        # Cognitive complexity

    # Common mistakes
    - misspell        # Spell checking
    - gocritic        # Provides diagnostics for bugs, performance and style issues
    - godox           # Detect TODO/FIXME/BUG comments (all TODOs should be in todo.md)

    # Magic numbers and strings
    - goconst         # Find repeated strings that could be constants
    - mnd             # Detect magic numbers

formatters-settings:
  gofmt:
    simplify: true

  gofumpt:
    extra-rules: true

  goimports:
    local-prefixes: github.com/genealogix/glx

linters-settings:
  gocyclo:
    min-complexity: 15

  gocognit:
    min-complexity: 20

  revive:
    rules:
      - name: exported
        disabled: false
      - name: package-comments
        disabled: true  # Not all packages need comments yet
      - name: var-naming
        disabled: false
      - name: use-any
        disabled: false  # Enforce using 'any' instead of 'interface{}'

  errcheck:
    check-blank: false
    check-type-assertions: true

  misspell:
    locale: US

  goconst:
    min-len: 3                    # Minimum length of string constant
    min-occurrences: 3            # Minimum number of occurrences to trigger
    ignore-tests: true            # Don't check test files for repeated strings
    match-constant: true          # Match constants in other packages
    numbers: false                # Don't check for repeated numbers (mnd handles this)
    ignore-strings: ""            # Strings to ignore (empty = none)

  mnd:
    # List of enabled checks, see https://github.com/tommy-muehle/go-mnd/#checks for description
    checks:
      - argument    # Check function arguments
      - case        # Check case statements
      - condition   # Check conditional statements
      - operation   # Check operations
      - return      # Check return statements
      - assign      # Check assignments
    ignored-numbers:
      - "0"         # Common default/zero value
      - "1"         # Common increment/single item
      - "2"         # Common pair/dual
      - "10"        # Common base-10 operations
      - "100"       # Common percentage base
      - "1024"      # Common KB size
    ignored-functions:
      - "make"      # make([]T, size) is fine
      - "len"       # len comparisons are fine
      - "cap"       # cap comparisons are fine
      - "append"    # append operations are fine
      - "time.*"    # time functions often use magic numbers
      - "strings.SplitN"  # SplitN(s, sep, n) where n is often a small number
      - "strings.Repeat"  # Repeat often uses small numbers

issues:
  exclude-use-default: false
  exclude-rules:
    # Exclude some linters for test files
    - path: _test\.go
      linters:
        - gocyclo
        - gocognit
        - errcheck
        - dupl

    # Exclude some staticcheck messages
    - linters:
        - staticcheck
      text: "SA1019:"  # Allow deprecated function usage temporarily

    # Exclude package comment rules
    - linters:
        - revive
      text: "package-comments"

  max-issues-per-linter: 0
  max-same-issues: 0

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
