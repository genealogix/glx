# golangci-lint configuration for GLX project
# See https://golangci-lint.run/usage/configuration/ for all options

version: 2

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports

linters:
  enable:
    # Code quality (enabled by default, but listed for clarity)
    - errcheck # Check for unchecked errors
    - govet # Standard Go tool
    - ineffassign # Detect ineffectual assignments
    - staticcheck # Advanced static analysis (includes gosimple, stylecheck)
    - unused # Check for unused code

    # Non-default Code quality linters
    - exptostd # Suggest using standard library functions
    - intrange # Suggest using range loops
    - unparam # Check for unused function parameters
    - wastedassign # Detect useless assignments
    - testifylint # Linter for testify usage
    - usestdlibvars # Suggest using standard library variables
    - predeclared # Check for shadowing of predeclared identifiers
    - prealloc # Detects when slices can be preallocated
    - containedctx # Check for context.Context usage in structs
    - contextcheck # Check for proper context inheritance
    - copyloopvar # Detect loop variable copies
    - ireturn # Accept interfaces return concrete types
    - nilerr
    - noctx # Detect functions that should accept context.Context
    - perfsprint # Detect performance issues with fmt.Sprintf
    - thelper # Check for proper use of testing.T.Helper()
    - unconvert # Detect unnecessary type conversions
    - usetesting # Suggest using standard testing package functions
    - err113 # Check for error handling issues with Go 1.13+ error wrapping
    - errname # Check error variable naming conventions


    # Style
    - revive # Replacement for golint
    - goheader # Check for proper file headers
    - tagalign # Ensure struct tags are aligned
    - nlreturn # Check for newlines before return statements
    - nakedret # Check for naked returns
    - importas # Check for consistent import aliases
    - modernize # Suggest modern Go usage patterns
    - grouper # Ensure imports, vars, and consts are grouped

    # Bugs
    - bodyclose # Check HTTP response body is closed
    - errname # Check error naming conventions
    - errorlint # Find code that will cause problems with Go 1.13+ error wrapping
    - nilerr # Check for returning nil error

    # Complexity
    - gocyclo # Cyclomatic complexity
    - gocognit # Cognitive complexity

    # Common mistakes
    - misspell # Spell checking
    - gocritic # Provides diagnostics for bugs, performance and style issues
    - godox # Detect TODO/FIXME/BUG comments (all TODOs should be in todo.md)

    # Magic numbers and strings
    - goconst # Find repeated strings that could be constants
    - mnd # Detect magic numbers

formatters-settings:
  gofmt:
    simplify: true

  gofumpt:
    extra-rules: true

  goimports:
    local-prefixes: github.com/genealogix/glx

linters-settings:
  gocyclo:
    min-complexity: 15

  gocognit:
    min-complexity: 20


  importas:
    # Do not allow unaliased imports of aliased packages.
    # Default: false
    no-unaliased: true
    # Do not allow non-required aliases.
    # Default: false
    no-extra-aliases: true

  goheader:
    template: |-
        // Copyright 2025 Oracynth, Inc.
        //
        // Licensed under the Apache License, Version 2.0 (the "License");
        // you may not use this file except in compliance with the License.
        // You may obtain a copy of the License at
        //
        //     http://www.apache.org/licenses/LICENSE-2.0
        //
        // Unless required by applicable law or agreed to in writing, software
        // distributed under the License is distributed on an "AS IS" BASIS,
        // WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        // See the License for the specific language governing permissions and
        // limitations under the License.

  revive:
    rules:
      - name: exported
        disabled: false
      - name: package-comments
        disabled: true # Not all packages need comments yet
      - name: var-naming
        disabled: false
      - name: use-any
        disabled: false # Enforce using 'any' instead of 'interface{}'

  errcheck:
    check-blank: false
    check-type-assertions: true

  misspell:
    locale: US

  goconst:
    min-len: 3 # Minimum length of string constant
    min-occurrences: 3 # Minimum number of occurrences to trigger
    ignore-tests: true # Don't check test files for repeated strings
    match-constant: true # Match constants in other packages
    numbers: false # Don't check for repeated numbers (mnd handles this)
    ignore-strings: # Strings to ignore (empty = none)
      - "0o755" # Common file permission
      - "0o644" # Common file permission
  mnd:
    # List of enabled checks, see https://github.com/tommy-muehle/go-mnd/#checks for description
    checks:
      - argument # Check function arguments
      - case # Check case statements
      - condition # Check conditional statements
      - operation # Check operations
      - return # Check return statements
      - assign # Check assignments
    ignored-numbers:
      - "0" # Common default/zero value
      - "1" # Common increment/single item
      - "2" # Common pair/dual
      - "10" # Common base-10 operations
      - "100" # Common percentage base
      - "1024" # Common KB size
      - "644" # Common file permission
      - "755" # Common file permission
    ignored-functions:
      - "make" # make([]T, size) is fine
      - "len" # len comparisons are fine
      - "cap" # cap comparisons are fine
      - "append" # append operations are fine
      - "time.*" # time functions often use magic numbers
      - "strings.SplitN" # SplitN(s, sep, n) where n is often a small number
      - "strings.Repeat" # Repeat often uses small numbers

  grouper:
    import-require-single-import: true
    import-require-grouping: true
    var-require-grouping: true
    const-require-grouping: true

issues:
  exclude-use-default: false
  exclude-rules:
    # Exclude some linters for test files
    - path: _test\.go
      linters:
        - gocyclo
        - gocognit
        - errcheck
        - dupl

  max-issues-per-linter: 0
  max-same-issues: 0

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
