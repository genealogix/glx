name: Auto-resolve Copilot suggestions

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 minutes

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    concurrency:
      group: copilot-auto-fix
      cancel-in-progress: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Find PR with unresolved Copilot threads
        id: find-pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Get all open same-repo PRs (exclude forks)
          PRS=$(gh pr list --repo "${{ github.repository }}" \
            --state open --limit 999 --json number,headRefName,isCrossRepository \
            --jq '.[] | select(.isCrossRepository == false) | .number')

          for PR_NUMBER in $PRS; do
            COUNT=$(gh api graphql -f query='
              query($owner: String!, $name: String!, $pr: Int!) {
                repository(owner: $owner, name: $name) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100) {
                      nodes {
                        isResolved
                        comments(first: 1) {
                          nodes { author { login } }
                        }
                      }
                    }
                  }
                }
              }' -f owner="${{ github.repository_owner }}" \
                 -f name="$(echo '${{ github.repository }}' | cut -d/ -f2)" \
                 -F pr="$PR_NUMBER" \
              --jq '[.data.repository.pullRequest.reviewThreads.nodes[]
                     | select(.isResolved == false)
                     | select(.comments.nodes[0].author.login == "copilot-pull-request-reviewer")] | length')

            if [ "$COUNT" != "0" ]; then
              BRANCH=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName --jq '.headRefName')
              echo "Found PR #$PR_NUMBER with $COUNT unresolved Copilot threads"
              echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
              echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
              break
            fi
          done

          if [ -z "$(grep 'number=' "$GITHUB_OUTPUT" 2>/dev/null)" ]; then
            echo "No PRs with unresolved Copilot threads"
          fi

      - name: Checkout repository
        if: steps.find-pr.outputs.number
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.find-pr.outputs.branch }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Run Claude Code to resolve Copilot suggestions
        if: steps.find-pr.outputs.number
        id: claude-fix
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            contents: write
            pull-requests: write
          prompt: |
            Copilot just reviewed PR #${{ steps.find-pr.outputs.number }} in ${{ github.repository }}.

            Your task:
            1. Read ALL unresolved Copilot review threads on this PR using:
               gh api graphql to get reviewThreads where isResolved == false
            2. For each unresolved thread:
               a. Read and understand the suggestion
               b. If it's a valid code improvement, make the fix in the codebase
               c. If it's not actionable (e.g. asking for tests that already exist, or suggesting changes that would break things), skip it but still reply explaining why
            3. Only if there are actual file changes: commit and push in a single commit with message "fix: address Copilot review suggestions"
               If no files were changed, skip the commit/push step entirely.
            4. Reply to each Copilot comment explaining what was done (or why it was skipped)
            5. Resolve each thread using the GraphQL resolveReviewThread mutation

            Important rules:
            - Follow all conventions in CLAUDE.md (no AI attribution in commits, use Makefile for tests, etc.)
            - Do NOT force push or rewrite history
            - Do NOT modify files unrelated to the suggestions
            - If a suggestion seems wrong or would break something, reply explaining why and resolve the thread anyway
            - Keep changes minimal and focused
            - Do NOT commit if there are no file changes — just reply and resolve
