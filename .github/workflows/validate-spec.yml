name: Validate Specification

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Validate JSON Schemas
        run: |
          npm install -g ajv-cli
          ajv compile -s schema/meta/schema.schema.json
          find schema/v1 -name "*.schema.json" -exec ajv compile -s {} \;
      
      - name: Check Schema References
        run: |
          go run ./glx/main.go check-schemas
  
  validate-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.19'
      
      - name: Install glx CLI
        run: |
          # Install Go-based CLI tool
          go install ./glx
      
      - name: Validate All Examples
        run: |
          for dir in examples/*/; do
            echo "Validating $dir"
            glx validate "$dir"
          done
  
  test-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Conformance Tests
        run: |
          cd test-suite
          ./run-tests.sh
  
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check Markdown Links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'


