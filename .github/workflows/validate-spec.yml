name: Validate Specification

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  validate-schemas:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: specification/package-lock.json

      - name: Install schema validation deps
        run: npm ci --prefix specification

      - name: Validate JSON Schemas
        run: make check-schemas
  
  validate-examples:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Build glx CLI
        run: |
          # Build Go-based CLI tool
          go build -o bin/glx ./glx
          chmod +x bin/glx
      
      - name: Validate All Examples
        run: |
          for dir in docs/examples/*/; do
            echo "Validating $dir"
            ./bin/glx validate "$dir"
          done
  
  test-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Run Go Tests
        run: |
          # Run all tests for both CLI and core library packages
          # Includes slow/large file tests (habsburg.ged with 34,020 persons)
          go test ./glx/... ./go-glx/... -v -timeout 15m
      
      - name: Build glx CLI
        run: |
          mkdir -p bin
          go build -o bin/glx ./glx

