name: Check External Links

on:
  schedule:
    - cron: '17 8 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

env:
  GIT_CONFIG_COUNT: 2
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main
  GIT_CONFIG_KEY_1: advice.detachedHead
  GIT_CONFIG_VALUE_1: "false"

jobs:
  check-external-links:
    name: Check External Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --include 'https?://' restricts to external URLs; internal links are
          # handled by scripts/check-links.sh (past lychee attempts failed on
          # VitePress extensionless links — see commit 589c857).
          # --accept tolerates 403 (anti-scraping) and 429 (rate-limit) to
          # avoid weekly false-positive noise; real dead links return 404/410.
          args: >-
            --no-progress
            --cache
            --max-cache-age 1w
            --include 'https?://'
            --exclude 'localhost'
            --exclude '127\.0\.0\.1'
            --exclude 'example\.com'
            --exclude-path 'docs/gedcom-spec'
            --max-retries 3
            --timeout 30
            --accept '200..=299,403,429'
            'specification/**/*.md'
            'docs/**/*.md'
            '*.md'
          fail: false
          token: ${{ secrets.GITHUB_TOKEN }}
          output: ./lychee-out.md

      - name: Find existing broken-links issue
        id: find-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          num=$(gh issue list --state open --search 'in:title "Broken external links detected"' --json number,title \
            --jq '[.[] | select(.title == "Broken external links detected")][0].number // empty')
          echo "number=$num" >> "$GITHUB_OUTPUT"

      - name: Create or update broken-links issue
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Broken external links detected
          content-filepath: ./lychee-out.md
          labels: tooling
          issue-number: ${{ steps.find-issue.outputs.number }}

      - name: Close stale broken-links issue
        if: steps.lychee.outputs.exit_code == 0 && steps.find-issue.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close "${{ steps.find-issue.outputs.number }}" \
            --comment "All external links healthy as of $(date -u '+%Y-%m-%d'). Automated closure by lychee.yml."
