name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC (matches security.yml)
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

env:
  GIT_CONFIG_COUNT: 2
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main
  GIT_CONFIG_KEY_1: advice.detachedHead
  GIT_CONFIG_VALUE_1: "false"

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      id-token: write   # OIDC for publish_results
      contents: read
      actions: read     # workflow YAML analysis (Token-Permissions, Pinned-Dependencies)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 5

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
