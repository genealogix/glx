name: 💡 Feature Request
description: Suggest a new feature or enhancement
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What limitation or pain point are you trying to address?
      placeholder: |
        I'm trying to do X, but I can't because Y.
        When I do Z, it would be helpful if W happened instead.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposal
      description: What should change?
      placeholder: |
        I propose adding a new command `glx migrate` that...
        The validation should support checking for...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Context
      description: Use cases, workarounds, or implementation notes.
      placeholder: |
        - When migrating from GEDCOM files
        - When collaborating with other researchers
        - When validating large family trees
    validations:
      required: false
