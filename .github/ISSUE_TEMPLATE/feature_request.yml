name: Feature Request
description: Suggest a new feature or enhancement
type: Feature
body:
  - type: dropdown
    attributes:
      label: Area
      description: Which part of the project does this affect?
      options:
        - cli
        - spec
        - go-glx
        - import-export
        - ui
        - tooling
    validations:
      required: true

  - type: textarea
    attributes:
      label: Problem
      description: What limitation or pain point are you trying to address?
      placeholder: |
        I'm trying to do X, but I can't because Y.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposal
      description: What should change?
      placeholder: |
        I propose adding a new command `glx migrate` that...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Context
      description: Use cases, workarounds, or implementation notes.
    validations:
      required: false
