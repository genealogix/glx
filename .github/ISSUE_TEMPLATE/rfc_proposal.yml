name: 📋 RFC Proposal
description: Propose changes to the GENEALOGIX specification
title: "[RFC] "
labels: ["rfc", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        # Request for Comments (RFC)

        This template is for proposing changes to the GENEALOGIX specification. RFCs are required for major changes that affect:

        - Core data model or entity types
        - File format or schema structure
        - Validation rules or requirements
        - Git workflow conventions
        - Interoperability standards

        For smaller features or bug fixes, please use the Feature Request or Bug Report templates instead.

  - type: textarea
    attributes:
      label: Summary
      description: |
        One paragraph summary of the proposed change.
      placeholder: |
        This RFC proposes adding support for custom relationship types beyond the standard parent-child and marriage relationships defined in the current specification.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Motivation
      description: |
        Why is this change needed? What problems does it solve?
        Describe the current limitations and how this proposal addresses them.
      placeholder: |
        Currently, GENEALOGIX only supports standard family relationships (parent-child, marriage). However, many family structures need to represent:

        - Adoption relationships
        - Guardianship
        - Step-relationships
        - Chosen family connections
        - Legal custody arrangements
        - Godparent relationships

        This limitation forces users to either misuse standard relationship types or store this information in unstructured notes, reducing the semantic clarity and interoperability of the data.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed Solution
      description: |
        Describe the technical details of your proposed solution.
        Include schema changes, file format modifications, and validation rules.
      placeholder: |
        ## Schema Changes

        Add a new `relationship_type` field to the relationship entity:

        ```json
        {
          "relationship_type": {
            "type": "string",
            "enum": ["parent-child", "marriage", "adoption", "guardianship", "step-parent", "godparent", "custom"],
            "default": "parent-child"
          },
          "custom_type_name": {
            "type": "string",
            "description": "Required when relationship_type is 'custom'"
          }
        }
        ```

        ## File Format

        ```yaml
        # examples/relationships/rel-adoption.glx
        id: rel-12345678
        version: "1.0"
        type: relationship
        relationship_type: adoption
        participants:
          - person: person-parent-1234
            role: adoptive_parent
          - person: person-child-5678
            role: adopted_child
        ```

        ## Validation Rules

        - When `relationship_type` is "custom", `custom_type_name` must be provided
        - Custom relationship types should be registered in a central registry
        - Migration tools should handle conversion from existing relationship formats
    validations:
      required: true

  - type: textarea
    attributes:
      label: Impact Assessment
      description: |
        What are the implications of this change?

        - **Breaking Changes**: Will this break existing archives?
        - **Migration Path**: How will existing data be migrated?
        - **Tooling**: What CLI changes are needed?
        - **Examples**: What new examples should be added?
        - **Testing**: What new test cases are needed?
      placeholder: |
        ## Breaking Changes
        - Existing relationship entities without `relationship_type` will default to "parent-child"
        - No breaking changes to file structure or existing fields

        ## Migration Path
        - CLI `glx migrate` command to add `relationship_type` field to existing relationships
        - Gradual adoption: new field is optional in v1.1, required in v2.0

        ## Tooling Updates
        - Update JSON schemas to include new field
        - Add validation for custom relationship type names
        - Update examples to demonstrate new relationship types

        ## Testing Requirements
        - Add test cases for all new relationship types
        - Test migration from v1.0 to v1.1 format
        - Validate that existing archives still work
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives Considered
      description: |
        What other approaches were considered? Why was this approach chosen?
      placeholder: |
        ## Alternative 1: Extend Role Field
        Instead of a new `relationship_type` field, we could extend the existing `role` field to include relationship semantics.

        **Rejected because**: This would mix relationship types with participant roles, creating ambiguity and making validation more complex.

        ## Alternative 2: Separate Entity Type
        Create a new entity type called "custom_relationship" instead of extending the existing relationship entity.

        **Rejected because**: This would fragment the data model and create unnecessary complexity for what is essentially a variation of the same concept.

        ## Alternative 3: Unstructured Approach
        Store custom relationships as unstructured text in notes or descriptions.

        **Rejected because**: This defeats the purpose of GENEALOGIX's structured, semantic approach and reduces interoperability.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Implementation Plan
      description: |
        If this RFC is accepted, how should it be implemented?
        Include a high-level timeline and identify who might work on it.
      placeholder: |
        ## Phase 1: Specification (2-3 weeks)
        - Update specification document with new relationship types
        - Define schema changes and validation rules
        - Create comprehensive examples

        ## Phase 2: Schema and Validation (1-2 weeks)
        - Update JSON schemas in schema/v1/
        - Add new validation rules to CLI tool
        - Update test suite with new test cases

        ## Phase 3: Migration Tools (1 week)
        - Implement `glx migrate` command
        - Add conversion utilities for common formats
        - Update documentation and examples

        ## Phase 4: Documentation and Testing (1 week)
        - Update all documentation to reflect new features
        - Comprehensive testing of all relationship types
        - Community review and feedback period

        ## Potential Contributors
        - Schema design: @maintainer-team
        - CLI implementation: @cli-team or community contributors
        - Documentation: @docs-team or community contributors
        - Testing: @testing-team or community contributors
    validations:
      required: false

  - type: textarea
    attributes:
      label: Open Questions
      description: |
        What questions need to be answered before this can be implemented?
        What feedback are you seeking from the community?
      placeholder: |
        1. **Relationship Type Names**: Should we use a controlled vocabulary or allow free-form custom names?
        2. **Backwards Compatibility**: How strictly should we handle missing `relationship_type` fields?
        3. **Validation Complexity**: How complex should validation rules be for custom relationship types?
        4. **Internationalization**: Should relationship type names support multiple languages?
        5. **GEDCOM Compatibility**: How should this map to GEDCOM's relationship structures?
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: RFC Checklist
      description: |
        Before submitting this RFC, please ensure:
      options:
        - label: I have read the RFC template and guidelines in rfcs/README.md
          required: true
        - label: I have searched existing RFCs and issues for similar proposals
          required: true
        - label: I have considered backwards compatibility and migration paths
          required: true
        - label: I am willing to help implement this RFC if it's accepted
          required: false
