name: Bug Report
description: Report a bug or unexpected behavior
type: Bug
body:
  - type: dropdown
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - cli
        - spec
        - go-glx
        - import-export
        - ui
        - tooling
    validations:
      required: true

  - type: textarea
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: A short description of the bug.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Reproduction
      description: How can we reproduce it?
      placeholder: |
        1. Run `glx validate ...`
        2. See error
    validations:
      required: true

  - type: textarea
    attributes:
      label: Context
      description: Include relevant environment details, logs, or validation output.
      placeholder: |
        - OS:
        - GLX version:
        - Go version:
    validations:
      required: false
