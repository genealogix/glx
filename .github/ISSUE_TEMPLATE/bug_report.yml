name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: A short description of the bug.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Reproduction
      description: How can we reproduce it?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    attributes:
      label: Context
      description: Include relevant environment details, logs, or validation output.
      placeholder: |
        - OS:
        - GLX version:
        - Go version:
        - Anything else relevant:
    validations:
      required: false
